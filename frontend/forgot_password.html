<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediScope - Forgot Password</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    * {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
  </style>
 </head>
 <body class="h-full bg-gradient-to-br from-sky-50 via-blue-50 to-teal-50">
  <div class="w-full h-full flex items-center justify-center px-4 py-8">
    <div class="w-full max-w-md">
     <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-slate-800 mb-2">MediScope</h1>
      <p class="text-slate-600">Reset your password</p>
     </div>
     <div class="glass-card rounded-3xl p-8 shadow-2xl">
      <div id="error-msg" class="error-message mb-4"></div>
      <div id="success-msg" class="success-message mb-4"></div>
      <form id="forgot-form" class="space-y-5">
       <div>
        <label for="role-select" class="block text-sm font-semibold text-slate-700 mb-2.5">I am a</label>
        <select id="role-select" class="form-input w-full px-4 py-3 rounded-xl">
         <option value="doctor">Doctor</option>
         <option value="patient">Patient</option>
        </select>
       </div>
       <div>
        <label for="email" class="block text-sm font-semibold text-slate-700 mb-2.5">Email Address</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" class="form-input w-full px-4 py-3 rounded-xl" required>
       </div>
       <button type="submit" class="btn-login w-full text-white font-semibold py-3 rounded-xl mt-6">Send Reset Email</button>
      </form>
      <div class="mt-6 text-center">
       <a href="/login" class="text-sm link-register">Back to Login</a>
      </div>
     </div>
    </div>
   </div>
  <script>
    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const role = document.getElementById('role-select').value;
      const response = await fetch('/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, role })
      });
      const result = await response.json();
      if (result.success) {
        document.getElementById('success-msg').textContent = result.message;
        document.getElementById('success-msg').classList.add('show');
      } else {
        document.getElementById('error-msg').textContent = result.message;
        document.getElementById('error-msg').classList.add('show');
      }
    });
  </script>
 </body>
</html>
