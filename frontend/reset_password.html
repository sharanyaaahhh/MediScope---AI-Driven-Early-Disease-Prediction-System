<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediScope - Reset Password</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    * {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
  </style>
 </head>
 <body class="h-full bg-gradient-to-br from-sky-50 via-blue-50 to-teal-50">
  <div class="w-full h-full flex items-center justify-center px-4 py-8">
    <div class="w-full max-w-md">
     <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-slate-800 mb-2">MediScope</h1>
      <p class="text-slate-600">Enter your new password</p>
     </div>
     <div class="glass-card rounded-3xl p-8 shadow-2xl">
      <div id="error-msg" class="error-message mb-4"></div>
      <div id="success-msg" class="success-message mb-4"></div>
      <form id="reset-form" class="space-y-5">
       <input type="hidden" id="token" name="token" value="{{ token }}">
       <div>
        <label for="password" class="block text-sm font-semibold text-slate-700 mb-2.5">New Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" class="form-input w-full px-4 py-3 rounded-xl" required>
       </div>
       <div>
        <label for="confirm-password" class="block text-sm font-semibold text-slate-700 mb-2.5">Confirm Password</label>
        <input type="password" id="confirm-password" name="confirm-password" placeholder="••••••••" class="form-input w-full px-4 py-3 rounded-xl" required>
       </div>
       <button type="submit" class="btn-login w-full text-white font-semibold py-3 rounded-xl mt-6">Reset Password</button>
      </form>
     </div>
    </div>
   </div>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    document.getElementById('token').value = token;

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      if (password !== confirmPassword) {
        document.getElementById('error-msg').textContent = 'Passwords do not match';
        document.getElementById('error-msg').classList.add('show');
        return;
      }
      const response = await fetch('/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password })
      });
      const result = await response.json();
      if (result.success) {
        document.getElementById('success-msg').textContent = result.message;
        document.getElementById('success-msg').classList.add('show');
        setTimeout(() => window.location.href = '/login', 2000);
      } else {
        document.getElementById('error-msg').textContent = result.message;
        document.getElementById('error-msg').classList.add('show');
      }
    });
  </script>
 </body>
</html>
