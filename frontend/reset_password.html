<!doctype html>
<html lang="en" class="h-full">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediScope - Reset Password</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap"
    rel="stylesheet">
  <style>
    * {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.6);
    }

    .medical-grid {
      background-image: linear-gradient(rgba(14, 165, 233, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(14, 165, 233, 0.05) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .gradient-text {
      background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .btn-login {
      background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
      transition: all 0.3s ease;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(14, 165, 233, 0.5);
    }

    .form-input {
      background: rgba(248, 250, 252, 0.8);
      border: 2px solid rgba(14, 165, 233, 0.1);
      transition: all 0.3s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: #0ea5e9;
      box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
      background: rgba(248, 250, 252, 1);
    }

    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #dc2626;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }

    .success-message {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #16a34a;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }

    .show {
      display: block;
      animation: slide-up 0.3s ease-out;
    }

    @keyframes slide-up {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body class="h-full bg-gradient-to-br from-sky-50 via-blue-50 to-teal-50">
  <div class="fixed inset-0 medical-grid pointer-events-none"></div>
  <div class="relative z-10 w-full h-full flex flex-col items-center justify-center px-4 py-8">
    <div class="w-full max-w-md">
      <div class="text-center mb-8">
        <div class="inline-block mb-6">
          <div
            class="w-16 h-16 rounded-2xl bg-gradient-to-br from-sky-500 to-sky-600 flex items-center justify-center shadow-lg">
            <svg class="w-8 h-8 text-white" viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
            </svg>
          </div>
        </div>
        <h1 class="text-3xl font-bold gradient-text mb-2">MediScope</h1>
        <p class="text-slate-600 font-medium">Set New Password</p>
      </div>
      <div class="glass-card rounded-3xl p-8 shadow-2xl">
        <div id="error-msg" class="error-message mb-4"></div>
        <div id="success-msg" class="success-message mb-4"></div>
        <form id="reset-form" class="space-y-5">
          <div>
            <label for="password" class="block text-sm font-semibold text-slate-700 mb-2.5">New Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••"
              class="form-input w-full px-4 py-3 rounded-xl" required>
          </div>
          <div>
            <label for="confirm-password" class="block text-sm font-semibold text-slate-700 mb-2.5">Confirm New
              Password</label>
            <input type="password" id="confirm-password" placeholder="••••••••"
              class="form-input w-full px-4 py-3 rounded-xl" required>
          </div>
          <button type="submit"
            class="btn-login w-full text-white font-semibold py-3 rounded-xl mt-4 shadow-lg flex items-center justify-center gap-2">
            <span id="btn-text">Reset Password</span>
          </button>
        </form>
        <div class="mt-8 text-center">
          <a href="/login" class="text-sm font-semibold text-sky-600 hover:text-sky-700 transition-colors">Return to
            Login</a>
        </div>
      </div>
    </div>
  </div>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    const role = urlParams.get('role');

    if (!token || !role) {
      document.getElementById('error-msg').textContent = "Invalid or expired reset link.";
      document.getElementById('error-msg').classList.add('show');
      document.getElementById('reset-form').style.display = 'none';
    }

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const errorMsg = document.getElementById('error-msg');
      const successMsg = document.getElementById('success-msg');
      const btn = e.target.querySelector('button');

      errorMsg.classList.remove('show');
      successMsg.classList.remove('show');

      if (password.length < 6) {
        errorMsg.textContent = 'Password must be at least 6 characters.';
        errorMsg.classList.add('show');
        return;
      }

      if (password !== confirmPassword) {
        errorMsg.textContent = 'Passwords do not match.';
        errorMsg.classList.add('show');
        return;
      }

      btn.disabled = true;
      const originalText = document.getElementById('btn-text').textContent;
      document.getElementById('btn-text').textContent = 'Updating...';

      try {
        const response = await fetch('/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, role, password })
        });
        const result = await response.json();

        if (result.success) {
          successMsg.textContent = result.message;
          successMsg.classList.add('show');
          setTimeout(() => window.location.href = '/login?status=success&message=' + encodeURIComponent(result.message), 2000);
        } else {
          errorMsg.textContent = result.message || "Failed to reset password.";
          errorMsg.classList.add('show');
        }
      } catch (err) {
        errorMsg.textContent = "An error occurred. Please try again.";
        errorMsg.classList.add('show');
      } finally {
        btn.disabled = false;
        document.getElementById('btn-text').textContent = originalText;
      }
    });
  </script>
</body>

</html>
